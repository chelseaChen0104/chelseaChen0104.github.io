baseURL = "https://chelseaChen0104.github.io/"
languageCode = "en-us"
title = "Chelsea's Blog"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Chelsea's Blog"
  description = "Notes on LLMs, RLHF, and post-training."
  author = "Chelsea Chen"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Hi 👋"
    Content = "I write about LLM post-training, RLHF, and the math that makes them work."

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your-email@example.com"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
